<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" font-family="Inter,system-ui,sans-serif" font-size="13">
  <style>
    .node { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; rx: 10; ry: 10; }
    .primary { fill: #dcfce7; stroke: #15803d; }
    .tools { fill: #e0e7ff; stroke: #4338ca; }
    .leaf { fill: #ffffff; stroke: #94a3b8; }
    .lbl { fill: #111827; font-weight: 600; }
    .sub { fill: #475569; }
    .edge { stroke: #94a3b8; stroke-width: 1; fill: none; }
    .title { font-size: 20px; font-weight: 700; fill: #111827; font-family: "Playfair Display", Georgia, serif; }
  </style>

  <text x="30" y="40" class="title">Personal Finance Tracker · Information Architecture</text>
  <text x="30" y="60" class="sub">Primary nav (green) · Tools nav (indigo) · Leaf screens (grey)</text>

  <!-- Root -->
  <rect x="540" y="90" width="120" height="44" class="node" />
  <text x="600" y="117" text-anchor="middle" class="lbl">Personal Finance Tracker app</text>

  <!-- Primary sections -->
  <g>
    <rect x="60"  y="180" width="160" height="44" class="node primary"/><text x="140" y="207" text-anchor="middle" class="lbl">Overview</text>
    <rect x="260" y="180" width="160" height="44" class="node primary"/><text x="340" y="207" text-anchor="middle" class="lbl">Wealth</text>
    <rect x="460" y="180" width="160" height="44" class="node primary"/><text x="540" y="207" text-anchor="middle" class="lbl">Money</text>
    <rect x="660" y="180" width="160" height="44" class="node primary"/><text x="740" y="207" text-anchor="middle" class="lbl">Essentials</text>
    <rect x="860" y="180" width="140" height="44" class="node tools"/><text x="930" y="207" text-anchor="middle" class="lbl">Import</text>
    <rect x="1020" y="180" width="160" height="44" class="node tools"/><text x="1100" y="207" text-anchor="middle" class="lbl">Settings / Tools</text>
  </g>

  <!-- Edges root->primary -->
  <g class="edge">
    <path d="M600,134 C600,160 140,160 140,180"/>
    <path d="M600,134 C600,160 340,160 340,180"/>
    <path d="M600,134 C600,160 540,160 540,180"/>
    <path d="M600,134 C600,160 740,160 740,180"/>
    <path d="M600,134 C600,160 930,160 930,180"/>
    <path d="M600,134 C600,160 1100,160 1100,180"/>
  </g>

  <!-- Overview leaves -->
  <g>
    <rect x="30" y="280" width="220" height="42" class="node leaf"/><text x="140" y="307" text-anchor="middle" class="sub">/dashboard (widgets)</text>
  </g>

  <!-- Wealth leaves -->
  <g>
    <rect x="260" y="280" width="160" height="36" class="node leaf"/><text x="340" y="303" text-anchor="middle" class="sub">/assets (list)</text>
    <rect x="260" y="326" width="160" height="36" class="node leaf"/><text x="340" y="349" text-anchor="middle" class="sub">/assets/new (wizard)</text>
    <rect x="260" y="372" width="160" height="36" class="node leaf"/><text x="340" y="395" text-anchor="middle" class="sub">/liabilities</text>
    <rect x="260" y="418" width="160" height="36" class="node leaf"/><text x="340" y="441" text-anchor="middle" class="sub">/snapshots (Net Worth)</text>
    <rect x="260" y="464" width="160" height="36" class="node leaf"/><text x="340" y="487" text-anchor="middle" class="sub">/allocation</text>
  </g>
  <g class="edge">
    <path d="M340,224 L340,280"/><path d="M340,316 L340,326"/><path d="M340,362 L340,372"/>
    <path d="M340,408 L340,418"/><path d="M340,454 L340,464"/>
  </g>

  <!-- Money leaves -->
  <g>
    <rect x="460" y="280" width="160" height="36" class="node leaf"/><text x="540" y="303" text-anchor="middle" class="sub">/expenses (list)</text>
    <rect x="460" y="326" width="160" height="36" class="node leaf"/><text x="540" y="349" text-anchor="middle" class="sub">/expenses/new (multi-row)</text>
    <rect x="460" y="372" width="160" height="36" class="node leaf"/><text x="540" y="395" text-anchor="middle" class="sub">/income (same tab)</text>
    <rect x="460" y="418" width="160" height="36" class="node leaf"/><text x="540" y="441" text-anchor="middle" class="sub">/insights</text>
  </g>
  <g class="edge">
    <path d="M540,224 L540,280"/><path d="M540,316 L540,326"/><path d="M540,362 L540,372"/><path d="M540,408 L540,418"/>
  </g>

  <!-- Essentials leaves -->
  <g>
    <rect x="660" y="280" width="160" height="36" class="node leaf"/><text x="740" y="303" text-anchor="middle" class="sub">/essentials (4 cards)</text>
    <rect x="660" y="326" width="160" height="36" class="node leaf"/><text x="740" y="349" text-anchor="middle" class="sub">/goals</text>
    <rect x="660" y="372" width="160" height="36" class="node leaf"/><text x="740" y="395" text-anchor="middle" class="sub">/goals/:id</text>
  </g>
  <g class="edge">
    <path d="M740,224 L740,280"/><path d="M740,316 L740,326"/><path d="M740,362 L740,372"/>
  </g>

  <!-- Import leaves -->
  <g>
    <rect x="860" y="280" width="140" height="36" class="node leaf"/><text x="930" y="303" text-anchor="middle" class="sub">/import (brokers)</text>
    <rect x="860" y="326" width="140" height="36" class="node leaf"/><text x="930" y="349" text-anchor="middle" class="sub">Standard CSV</text>
  </g>
  <g class="edge">
    <path d="M930,224 L930,280"/><path d="M930,316 L930,326"/>
  </g>

  <!-- Settings leaves -->
  <g>
    <rect x="1020" y="280" width="160" height="36" class="node leaf"/><text x="1100" y="303" text-anchor="middle" class="sub">/settings?tab=account</text>
    <rect x="1020" y="326" width="160" height="36" class="node leaf"/><text x="1100" y="349" text-anchor="middle" class="sub">?tab=preferences</text>
    <rect x="1020" y="372" width="160" height="36" class="node leaf"/><text x="1100" y="395" text-anchor="middle" class="sub">?tab=recurring</text>
    <rect x="1020" y="418" width="160" height="36" class="node leaf"/><text x="1100" y="441" text-anchor="middle" class="sub">?tab=profiles (v2)</text>
    <rect x="1020" y="464" width="160" height="36" class="node leaf"/><text x="1100" y="487" text-anchor="middle" class="sub">?tab=shared (v3)</text>
    <rect x="1020" y="510" width="160" height="36" class="node leaf"/><text x="1100" y="533" text-anchor="middle" class="sub">?tab=data</text>
    <rect x="1020" y="556" width="160" height="36" class="node leaf"/><text x="1100" y="579" text-anchor="middle" class="sub">?tab=billing</text>
    <rect x="1020" y="608" width="160" height="36" class="node leaf"/><text x="1100" y="631" text-anchor="middle" class="sub">/whats-new</text>
  </g>
  <g class="edge">
    <path d="M1100,224 L1100,280"/>
    <path d="M1100,316 L1100,326"/><path d="M1100,362 L1100,372"/>
    <path d="M1100,408 L1100,418"/><path d="M1100,454 L1100,464"/>
    <path d="M1100,500 L1100,510"/><path d="M1100,546 L1100,556"/>
    <path d="M1100,592 L1100,608"/>
  </g>

  <text x="30" y="700" class="sub">Top-bar (all pages): hide/show values · theme · notifications · profile menu.</text>
  <text x="30" y="720" class="sub">Empty-state CTAs bridge between screens (e.g. Net Worth → Add Assets, Allocation → Add Assets, Essentials → Goals).</text>
</svg>
