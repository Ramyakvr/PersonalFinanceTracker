{% comment %}
Tab strip for the Essentials section. `active` ∈ {essentials, goals}.
{% endcomment %}
<div class="flex gap-6 border-b border-slate-200 mb-6">
  <a href="{% url 'essentials' %}"
     class="pb-2 text-sm font-medium {% if active == 'essentials' %}border-b-2 border-emerald-700 text-emerald-800{% else %}text-slate-500 hover:text-slate-800{% endif %}">
    Essentials
  </a>
  <a href="{% url 'goal_list' %}"
     class="pb-2 text-sm font-medium {% if active == 'goals' %}border-b-2 border-emerald-700 text-emerald-800{% else %}text-slate-500 hover:text-slate-800{% endif %}">
    Goals
  </a>
</div>
